<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Solarium — fly a solar system and toggle classical aspects." />
    <title>Solarium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='6' fill='%23c9a227'/%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="root">
      <canvas id="viewport" aria-label="Solar system viewport"></canvas>

      <header class="chrome top">
        <div class="identity">
          <span class="pulse" aria-hidden="true"></span>
          <div>
            <h1>Solarium</h1>
            <p>3D orrery · aspect theater</p>
          </div>
        </div>
        <p class="frame" id="frame-label">geocentric · aspects · readable scale</p>
      </header>

      <aside class="chrome panel" aria-label="Solarium controls">
        <section>
          <h2>Time</h2>
          <div class="actions">
            <button type="button" id="jump-now">Now</button>
            <button type="button" id="jump-squares" class="quiet">Squares demo</button>
          </div>
          <label class="field">
            <span>UTC</span>
            <input id="when" type="datetime-local" />
          </label>
          <p class="mono muted" id="when-display">—</p>
        </section>

        <section>
          <h2>Aspects</h2>
          <p class="muted small">Orb 6° · majors</p>
          <div id="aspect-switches" class="switches" role="group" aria-label="Aspect filters"></div>
          <ul id="aspect-hits" class="hits" aria-live="polite"></ul>
        </section>

        <section>
          <h2>Legend</h2>
          <ul id="aspect-legend" class="legend"></ul>
        </section>
      </aside>

      <footer class="chrome bottom">
        <p>Drag orbit · scroll zoom · <span id="fps" class="mono">—</span></p>
        <p class="muted small">Fresh skeleton · NASA textures next · <a href="./CREDITS.md">credits</a></p>
      </footer>

      <div id="no-webgl" class="blocker" hidden>
        <p>WebGL is required. Open this in a recent Chrome, Firefox, or Safari.</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
